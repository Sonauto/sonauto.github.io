---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.author %}
      <p class="post-author">
        {{ page.author }}{% if page.role %} · {{ page.role }}{% endif %}
      </p>
    {% endif %}
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
